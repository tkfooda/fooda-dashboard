<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FOODA @ Qualcomm · Declining Balance Dashboard</title>
  <!-- Firebase compat SDK (synchronous, no module system needed) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    :root {
      --wt: #2563eb; --az: #16a34a; --q: #dc2626; --s: #9333ea;
      --bg: #f0f4f8; --card: #fff; --border: #e2e8f0;
      --text: #1e293b; --muted: #64748b; --header-bg: #1a1a1a;
      --fooda: #F15D3B; --fooda-dk: #d44e2f;
      --bf: #f59e0b;   /* breakfast amber  */
      --ln: #0ea5e9;   /* lunch sky        */
      --dn: #8b5cf6;   /* dinner purple    */
      --rt: #14b8a6;   /* retail teal      */
      --br: #b45309;   /* barista coffee   */
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
           background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── HEADER ── */
    .app-header {
      background: var(--header-bg); color: #fff;
      padding: 12px 28px; display: flex; align-items: center; gap: 18px;
    }
    .app-header .logo-wrap { display: flex; align-items: center; flex-shrink: 0; }
    .app-header .logo-wrap svg { height: 38px; width: auto; display: block; }
    .app-header .header-divider {
      width: 1px; height: 32px; background: rgba(255,255,255,.2); flex-shrink: 0;
    }
    .app-header .header-titles { flex: 1; }
    .app-header .header-titles .ht-top {
      font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
      color: var(--fooda); margin-bottom: 1px;
    }
    .app-header .header-titles .ht-main {
      font-size: 16px; font-weight: 700; color: #fff; line-height: 1.2;
    }
    .app-header .hdate { font-size: 11px; opacity: .5; white-space: nowrap; }

    /* ── MONTH BAR ── */
    .month-bar {
      background: #fff; border-bottom: 1px solid var(--border);
      padding: 10px 28px; display: flex; align-items: center; gap: 10px;
    }
    .btn-nav {
      background: none; border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 12px; cursor: pointer; font-size: 13px; color: var(--text);
    }
    .btn-nav:hover { background: var(--bg); }
    .month-label { font-weight: 700; font-size: 15px; min-width: 160px; text-align: center; }
    .btn-today {
      margin-left: auto; background: var(--fooda); color: #fff;
      border: none; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 12px; font-weight: 600;
    }
    .btn-today:hover { background: var(--fooda-dk); }

    /* ── SUMMARY CARDS ── */
    .summary-grid {
      display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; padding: 24px 28px 8px;
    }
    .s-card {
      background: #fff; border-radius: 12px; padding: 18px 20px;
      border: 2px solid var(--border); cursor: pointer;
      transition: box-shadow .15s, transform .15s;
    }
    .s-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.09); transform: translateY(-2px); }
    .s-card.active { box-shadow: 0 4px 16px rgba(0,0,0,.12); }
    .s-card .acct-label { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 6px; }
    .s-card .bal-big { font-size: 26px; font-weight: 800; margin-bottom: 2px; }
    .s-card .bal-sub { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
    .pbar { height: 5px; background: #e2e8f0; border-radius: 99px; overflow: hidden; margin-bottom: 10px; }
    .pbar-fill { height: 100%; border-radius: 99px; transition: width .4s; }
    .s-card .mini-stats { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); gap: 4px; }
    .mini-stats .val { font-weight: 700; display: block; }
    .c-green { color: #16a34a; } .c-red { color: #dc2626; } .c-amber { color: #d97706; }
    .c-bf { color: var(--bf); } .c-ln { color: var(--ln); } .c-dn { color: var(--dn); }
    .c-rt { color: var(--rt); } .c-br { color: var(--br); }

    /* ── ACCOUNT DETAIL ── */
    .detail-wrap { padding: 20px 28px 40px; }
    .detail-topbar { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
    .detail-topbar h2 { font-size: 18px; font-weight: 700; }
    .acct-pill {
      font-size: 12px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
      padding: 3px 10px; border-radius: 99px; color: #fff;
    }

    /* ── BALANCE EDITOR ── */
    .bal-editor {
      background: #fff; border: 1px solid var(--border); border-radius: 12px;
      padding: 16px 22px; display: flex; align-items: center; gap: 20px;
      margin-bottom: 18px; flex-wrap: wrap;
    }
    .bal-editor label { font-size: 12px; font-weight: 600; color: var(--muted); white-space: nowrap; }
    .bal-input-wrap { display: flex; align-items: center; gap: 6px; }
    .bal-input-wrap span { font-size: 18px; font-weight: 700; color: var(--muted); }
    .bal-editor input[type=number] {
      border: 2px solid var(--border); border-radius: 8px; padding: 7px 10px;
      font-size: 18px; font-weight: 700; width: 160px; color: var(--text);
    }
    .bal-editor input[type=number]:focus { outline: none; }
    .kpis { margin-left: auto; display: flex; gap: 22px; flex-wrap: wrap; }
    .kpi { text-align: center; }
    .kpi .kv { font-size: 17px; font-weight: 800; }
    .kpi .kl { font-size: 10px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: .04em; }

    /* ── LAYOUT ── */
    .detail-cols { display: grid; grid-template-columns: 1fr 370px; gap: 18px; align-items: start; }

    /* ── TABLE CARD ── */
    .tbl-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .tbl-head { padding: 13px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
    .tbl-head h3 { font-size: 13px; font-weight: 700; }
    .tbl-head-right { display: flex; gap: 8px; align-items: center; }
    .meal-legend { display: flex; gap: 10px; font-size: 11px; font-weight: 600; }
    .leg-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 3px; }
    .btn-add {
      background: var(--fooda); color: #fff; border: none;
      border-radius: 7px; padding: 7px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .btn-add:hover { background: var(--fooda-dk); }

    /* Table overflow scroll */
    .tbl-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 700px; }
    thead th {
      background: #f8fafc; padding: 9px 10px; text-align: left;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
      color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    thead th.num { text-align: right; }
    thead th.bf-h { color: var(--bf); }
    thead th.ln-h { color: var(--ln); }
    thead th.dn-h { color: var(--dn); }
    thead th.rt-h { color: var(--rt); }
    thead th.br-h { color: var(--br); }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fafbfc; }
    tbody td { padding: 8px 10px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    tbody td.num { text-align: right; }

    td input[type=date], td input[type=number] {
      border: 1px solid transparent; border-radius: 5px; padding: 4px 6px;
      font-size: 13px; width: 100%; background: transparent;
      font-family: inherit; color: var(--text);
    }
    td input[type=number] { text-align: right; min-width: 70px; }
    td input:hover { border-color: #cbd5e1; }
    td input:focus { outline: none; border-color: #94a3b8; background: #fff; }

    .btn-del { background: none; border: none; cursor: pointer; color: #cbd5e1; font-size: 17px; padding: 2px 5px; border-radius: 4px; }
    .btn-del:hover { color: #dc2626; background: #fee2e2; }

    .tfoot-row td { font-size: 12px; font-weight: 700; background: #f8fafc; color: var(--text); padding: 10px 10px; border-top: 2px solid var(--border); white-space: nowrap; }

    .empty-state { padding: 40px; text-align: center; color: var(--muted); font-size: 13px; }
    .empty-state .ei { font-size: 32px; margin-bottom: 8px; }

    /* ── CHART CARD ── */
    .chart-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .chart-card h3 { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
    .chart-sub { font-size: 11px; color: var(--muted); margin-bottom: 14px; }
    .chart-wrap { position: relative; height: 240px; }

    /* ── MEAL BREAKDOWN CHART ── */
    .meal-chart-wrap { position: relative; height: 160px; margin-top: 16px; }
    .chart-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0 12px; }
    .chart-card .sub-h { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 10px; }

    /* ── DETAIL TABS ── */
    .dtab-bar {
      display: flex; gap: 4px; margin-bottom: 18px;
      border-bottom: 2px solid var(--border); padding-bottom: 0;
    }
    .dtab {
      padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer;
      border: none; background: none; color: var(--muted); border-radius: 8px 8px 0 0;
      margin-bottom: -2px; border-bottom: 2px solid transparent; transition: color .15s;
    }
    .dtab:hover { color: var(--text); background: #f8fafc; }
    .dtab.active { color: var(--text); border-bottom-color: currentColor; background: #fff; }

    /* ── COGS TAB ── */
    .cogs-grid { display: grid; grid-template-columns: 1fr 370px; gap: 18px; align-items: start; }
    .cogs-kpi-bar {
      background: #fff; border: 1px solid var(--border); border-radius: 12px;
      padding: 16px 22px; display: flex; gap: 0; margin-bottom: 18px;
      overflow: hidden;
    }
    .cogs-kpi-bar .ck {
      flex: 1; text-align: center; padding: 6px 12px;
      border-right: 1px solid var(--border);
    }
    .cogs-kpi-bar .ck:last-child { border-right: none; }
    .ck .cv { font-size: 22px; font-weight: 800; }
    .ck .cl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-top: 2px; }
    .cogs-pct-bar { height: 8px; background: #e2e8f0; border-radius: 99px; overflow: hidden; margin-top: 8px; }
    .cogs-pct-fill { height: 100%; border-radius: 99px; }

    .cogs-tbl-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .cogs-tbl-head { padding: 13px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .cogs-tbl-head h3 { font-size: 13px; font-weight: 700; }

    .cogs-chart-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .cogs-chart-card h3 { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
    .cogs-chart-wrap { position: relative; height: 240px; }
    .cogs-chart-wrap2 { position: relative; height: 160px; margin-top: 16px; }

    .pct-green { color: #16a34a; } .pct-amber { color: #d97706; } .pct-red { color: #dc2626; }

    /* ── VIEW TOGGLE ── */
    .view-toggle-bar {
      background: #fff; border-bottom: 1px solid var(--border);
      padding: 7px 28px; display: flex; gap: 8px; align-items: center;
    }
    .btn-view {
      padding: 5px 16px; border-radius: 20px; border: 1px solid var(--border);
      font-size: 12px; font-weight: 600; cursor: pointer; background: none; color: var(--muted);
      transition: all .15s;
    }
    .btn-view.active { background: var(--fooda); color: #fff; border-color: var(--fooda); }
    .btn-view:hover:not(.active) { background: var(--bg); color: var(--text); }

    /* ── DAILY SALES VIEW ── */
    .daily-wrap { padding: 20px 28px 48px; display: none; }
    .daily-chart-card {
      background: #fff; border: 1px solid var(--border); border-radius: 12px;
      padding: 20px; margin-bottom: 18px;
    }
    .daily-chart-card h3 { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
    .daily-chart-wrap { position: relative; height: 280px; }
    .daily-tbl-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .daily-tbl-scroll { overflow-x: auto; }
    .daily-tbl { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 680px; }
    .daily-tbl thead th {
      background: #f8fafc; padding: 9px 14px; text-align: right;
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
      color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    .daily-tbl thead th.lft { text-align: left; }
    .daily-tbl thead th.az-h { color: #16a34a; } .daily-tbl thead th.q-h  { color: #dc2626; }
    .daily-tbl thead th.s-h  { color: #9333ea; } .daily-tbl thead th.wt-h { color: #2563eb; }
    .daily-tbl thead th.tot-h { color: var(--fooda); }
    .daily-tbl tbody tr:hover td { background: #fafbfc; }
    .daily-tbl tbody td { padding: 8px 14px; border-bottom: 1px solid #f1f5f9; text-align: right; vertical-align: top; }
    .daily-tbl tbody td.date-cell { text-align: left; font-weight: 700; white-space: nowrap; color: var(--text); }
    .daily-tbl tbody td.day-cell  { text-align: center; font-size: 10px; color: var(--muted); font-weight: 500; }
    .d-val { font-weight: 700; display: block; }
    .d-sub { font-size: 10px; color: var(--muted); font-weight: 400; margin-top: 1px; line-height: 1.4; }
    .d-zero { color: #cbd5e1; font-weight: 400; }
    .daily-tbl tr.week-sep td { border-top: 2px solid #e2e8f0; }
    .daily-tbl tr.week-hdr td {
      background: #f8fafc; font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--muted); padding: 5px 14px; border-bottom: 1px solid var(--border);
    }
    .daily-tbl tfoot td {
      font-size: 12px; font-weight: 800; background: var(--fooda); color: #fff;
      padding: 11px 14px; border-top: 2px solid var(--border); text-align: right;
    }
    .daily-tbl tfoot td.lft { text-align: left; }

    /* ── SAVE INDICATOR ── */
    .save-bar {
      position: fixed; bottom: 18px; right: 22px; z-index: 999;
      display: flex; gap: 8px; align-items: center;
    }
    .save-indicator {
      background: #1a1a1a; color: #fff; font-size: 11px; font-weight: 600;
      padding: 6px 13px; border-radius: 20px; opacity: 0;
      transition: opacity .3s; pointer-events: none; letter-spacing: .03em;
    }
    .save-indicator.show { opacity: 1; }
    .loading-overlay {
      position: fixed; inset: 0; background: #fff; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px; font-size: 15px; color: var(--muted);
      font-weight: 600;
    }
    .loading-overlay .spin {
      width: 36px; height: 36px; border: 3px solid #e2e8f0;
      border-top-color: var(--fooda); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fb-status {
      font-size: 11px; font-weight: 600; padding: 6px 13px;
      border-radius: 20px; pointer-events: none;
    }
    .fb-status.connected    { background: #dcfce7; color: #16a34a; }
    .fb-status.disconnected { background: #fee2e2; color: #dc2626; }
    .fb-status.syncing      { background: #fef9c3; color: #b45309; }
    .btn-download {
      background: #1a1a1a; color: #fff; border: none;
      border-radius: 20px; font-size: 11px; font-weight: 600;
      padding: 6px 13px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }
    .btn-download:hover { background: var(--fooda); }
    .btn-reset {
      background: #fff; border: 1px solid var(--border); color: var(--muted);
      border-radius: 20px; font-size: 11px; font-weight: 600;
      padding: 6px 13px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    .btn-reset:hover { border-color: #dc2626; color: #dc2626; background: #fff5f5; }

    /* ── COGS SUB-TABS ── */
    .cogs-subtab-bar {
      display: flex; gap: 4px; margin-bottom: 16px;
      border-bottom: 2px solid var(--border);
    }
    .cogs-stab {
      padding: 7px 16px; font-size: 12px; font-weight: 600; cursor: pointer;
      border: none; background: none; color: var(--muted); border-radius: 7px 7px 0 0;
      margin-bottom: -2px; border-bottom: 2px solid transparent;
    }
    .cogs-stab:hover { color: var(--text); background: #f8fafc; }
    .cogs-stab.active { color: var(--text); border-bottom-color: currentColor; background: #fff; }

    /* ── ANCILLARY TABLE ── */
    .anc-tbl-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .anc-tbl-head { padding: 13px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .anc-tbl-head h3 { font-size: 13px; font-weight: 700; }
    .anc-note-input {
      border: 1px solid transparent; border-radius: 5px; padding: 4px 6px;
      font-size: 12px; width: 100%; background: transparent;
      font-family: inherit; color: var(--muted); resize: none;
    }
    .anc-note-input:hover { border-color: #cbd5e1; }
    .anc-note-input:focus { outline: none; border-color: #94a3b8; background: #fff; color: var(--text); }
    .vendor-note-input {
      border: 1px solid transparent; border-radius: 5px; padding: 3px 5px;
      font-size: 11px; width: 100%; min-width: 120px; background: transparent;
      font-family: inherit; color: var(--muted); resize: none;
    }
    .vendor-note-input:hover { border-color: #cbd5e1; }
    .vendor-note-input:focus { outline: none; border-color: #94a3b8; background: #fff; color: var(--text); }

    /* ── RESPONSIVE ── */
    @media (max-width: 1200px) {
      .summary-grid { grid-template-columns: repeat(2,1fr); }
      .detail-cols  { grid-template-columns: 1fr; }
      .cogs-grid    { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .summary-grid { grid-template-columns: 1fr; }
      .app-header .logo-wrap svg { height: 28px; }
      .app-header .ht-main { font-size: 13px; }
      .detail-wrap, .month-bar { padding-left: 14px; padding-right: 14px; }
      .summary-grid { padding: 14px 14px 6px; }
    }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spin"></div>
  Connecting to database…
</div>

<header class="app-header">
  <div class="logo-wrap">

function setStatus(mode, text) {

/* ── Write to Firebase (debounced 600ms) ── */
function saveState() {
  // Flash "Saved" indicator
  const el = document.getElementById('saveIndicator');
  if (el) {
    el.classList.add('show');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => el.classList.remove('show'), 1800);
  }
  // Debounce Firebase write so rapid edits don't thrash
  clearTimeout(fbWriteTimer);
  fbWriteTimer = setTimeout(() => {
    if (!db) return;
    setStatus('syncing', '⏫ Saving…');
    const payload = { state, vMonth, vYear, active, detailTab, viewMode, savedAt: Date.now() };
    db.ref(DB_REF).set(payload)
      .then(() => setStatus('connected', '🟢 Live'))
      .catch(e => { console.warn('Firebase write error:', e); setStatus('disconnected', '🔴 Offline'); });
  }, 600);
}

/* ── Listen for remote changes and re-render ── */
function startListening() {
  if (!db) {
    // Firebase unavailable — run offline with localStorage
    setStatus('disconnected', '🔴 Offline mode');
    const raw = localStorage.getItem('fooda_qualcomm_v5');
    if (raw) try { const p = JSON.parse(raw); Object.assign(state, p.state || {}); } catch(e) {}
    ensureMonthDays(vMonth, vYear);
    render();
    document.getElementById('loadingOverlay').style.display = 'none';
    return;
  }

  db.ref(DB_REF).on('value', snapshot => {
    const payload = snapshot.val();
    if (!payload || !payload.state) {
      // Nothing in DB yet — push our default state up
      isLoaded = true;
      saveState();
      ensureMonthDays(vMonth, vYear);
      render();
      document.getElementById('loadingOverlay').style.display = 'none';
      return;
    }
    // Merge remote state into local
    ACCTS.forEach(acct => {
      if (payload.state[acct]) {
        state[acct].startingBalance = payload.state[acct].startingBalance ?? state[acct].startingBalance;
        state[acct].entries         = payload.state[acct].entries ?? [];
        state[acct].ancillary       = payload.state[acct].ancillary ?? [];
        state[acct].retail          = payload.state[acct].retail ?? [];
      }
    });
    if (payload.vMonth != null) vMonth    = payload.vMonth;
    if (payload.vYear  != null) vYear     = payload.vYear;
    if (payload.active)         active    = payload.active;
    if (payload.detailTab)      detailTab = payload.detailTab;
    if (payload.viewMode)       viewMode  = payload.viewMode;
    isLoaded = true;
    setStatus('connected', '🟢 Live');
    ensureMonthDays(vMonth, vYear);
    render();
    document.getElementById('loadingOverlay').style.display = 'none';
  }, err => {
    console.warn('Firebase read error:', err);
    setStatus('disconnected', '🔴 Offline — edits local only');
    // Fall back to localStorage
    const raw = localStorage.getItem('fooda_qualcomm_v5');
    if (raw) try { const p = JSON.parse(raw); Object.assign(state, p.state || {}); } catch(e) {}
    isLoaded = true;
    ensureMonthDays(vMonth, vYear);
    render();
    document.getElementById('loadingOverlay').style.display = 'none';
  });

  // Connection state indicator
  if (db) db.ref('.info/connected').on('value', snap => {
    if (!snap.val()) setStatus('disconnected', '🔴 Offline');
  });
}

function resetToDefaults() {

/* ══════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════ */
const fmt  = v => '$' + Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtK = v => { const a=Math.abs(v); return a>=1000?'$'+(a/1000).toFixed(1)+'k':'$'+a.toFixed(0); };

function rowSales(e) {
  return parseFloat(e.dailySales) || 0;
}
function rowSpend(e) {
  return VENDORS.reduce((s,v) => s + (parseFloat(e[v])||0), 0);
}

function parseDate(dateStr) {
  // Handles both M/D/YYYY and YYYY-MM-DD
  if (!dateStr) return null;
  if (dateStr.includes('-')) return new Date(dateStr + 'T00:00:00');
  const parts = dateStr.split('/');
  if (parts.length === 3) return new Date(parseInt(parts[2]), parseInt(parts[0])-1, parseInt(parts[1]));
  return new Date(dateStr);
}

function monthEntries(acct) {
  return state[acct].entries
    .filter(e => {
      if (!e.date) return false;
      const d = parseDate(e.date);
      return d && d.getMonth() === vMonth && d.getFullYear() === vYear;
    })
    .sort((a,b) => parseDate(a.date) - parseDate(b.date));
}

function runningRows(acct) {
  const rows = monthEntries(acct);
  const ancByDate = {};
  ancillaryMonthEntries(acct).forEach(a => {
    ancByDate[a.date] = (ancByDate[a.date]||0) + (parseFloat(a.amount)||0);
  });
  let bal = state[acct].startingBalance;
  return rows.map(e => {
    const sales = rowSales(e);
    const sp    = rowSpend(e) + (ancByDate[e.date]||0);
    bal = bal + sales - sp;
    return { ...e, totalSales: sales, totalSpend: sp, runBal: bal };
  });
}

function currentBalance(acct) {
  const rows = runningRows(acct);
  return rows.length ? rows[rows.length-1].runBal : state[acct].startingBalance;
}

function ancillaryMonthEntries(acct) {
  return (state[acct].ancillary || []).filter(a => {
    if (!a.date) return false;
    const d = parseDate(a.date);
    return d && d.getMonth() === vMonth && d.getFullYear() === vYear;
  }).sort((a,b) => parseDate(a.date) - parseDate(b.date));
}

function monthTotals(acct) {
  const rows  = monthEntries(acct);
  const sales = rows.reduce((s,e)=>s+(parseFloat(e.dailySales)||0),0);
  const vendors = {};
  VENDORS.forEach(v => { vendors[v] = rows.reduce((s,e)=>s+(parseFloat(e[v])||0),0); });
  const vendorSpend = VENDORS.reduce((s,v)=>s+vendors[v],0);
  const ancSpend = ancillaryMonthEntries(acct).reduce((s,a)=>s+(parseFloat(a.amount)||0),0);
  const spend = vendorSpend + ancSpend;
  return { sales, spend, vendorSpend, ancSpend, net: sales-spend, vendors };
}

function getMonthName(m,y) {
  return new Date(y,m,1).toLocaleString('en-US',{month:'long',year:'numeric'});
}

function balClass(val, start) {
  if (start <= 0) return '';
  const p = val/start;
  if (p > .5) return 'c-green';
  if (p > .2) return 'c-amber';
  return 'c-red';
}

/* ── Ensure every calendar day of a month has an entry for every account ── */
function ensureMonthDays(m, y) {
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  let added = false;
  ACCTS.forEach(acct => {
    if (!state[acct].ancillary) { state[acct].ancillary = []; added = true; }
    if (!state[acct].retail)    { state[acct].retail    = []; added = true; }
    const existing = new Set(state[acct].entries.map(e => e.date));
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${m+1}/${d}/${y}`;
      if (!existing.has(dateStr)) {
        const newEntry = { id: mkId(), date: dateStr, dailySales: 0 };
        VENDORS.forEach(v => { newEntry[v] = ''; });
        state[acct].entries.push(newEntry);
        existing.add(dateStr);
        added = true;
      }
    }
  });
  if (added) saveState();
}

function renderDailyView() {
  const allDates = new Set();
  ACCTS.forEach(acct => monthEntries(acct).forEach(e => allDates.add(e.date)));
  const dates = [...allDates].sort((a,b) => parseDate(a) - parseDate(b));

  const dw = document.getElementById('dailyWrap');
  if (!dates.length) {
    dw.innerHTML = `<div class="empty-state"><div class="ei">📅</div>No entries for ${getMonthName(vMonth,vYear)}</div>`;
    return;
  }

  /* build lookup: acct|date → {total} */
  const dm = {};
  ACCTS.forEach(acct => {
    monthEntries(acct).forEach(e => {
      dm[`${acct}|${e.date}`] = { total: parseFloat(e.dailySales)||0 };
    });
  });

  const dayStr  = d => parseDate(d).toLocaleDateString('en-US',{weekday:'short'});
  const dateStr = d => parseDate(d).toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const weekOf  = d => { const dt=parseDate(d); return Math.ceil((dt.getDate()+((dt.getDay()||7)-1))/7); };

  /* table rows — grouped by week with separator */
  let prevWeek = -1;
  const tableRows = dates.map(date => {
    const wk = weekOf(date);
    const weekBanner = wk !== prevWeek
      ? `<tr class="week-hdr"><td colspan="7">Week ${wk} — ${getMonthName(vMonth,vYear)}</td></tr>`
      : '';
    prevWeek = wk;

    const acctCells = ACCTS.map(acct => {
      const d = dm[`${acct}|${date}`];
      if (!d || d.total === 0) return `<td class="d-zero">—</td>`;
      return `<td><span class="d-val">${fmt(d.total)}</span></td>`;
    });

    const rowTotal = ACCTS.reduce((s,a)=>s+(dm[`${a}|${date}`]?.total||0),0);
    return weekBanner + `<tr>
      <td class="date-cell">${dateStr(date)}</td>
      <td class="day-cell">${dayStr(date)}</td>
      ${acctCells.join('')}
      <td><span class="d-val" style="color:var(--fooda)">${fmt(rowTotal)}</span></td>
    </tr>`;
  }).join('');

  /* footer totals */
  const footerCells = ACCTS.map(acct => {
    const tot = dates.reduce((s,d)=>s+(dm[`${acct}|${d}`]?.total||0),0);
    return `<td>${fmt(tot)}</td>`;
  });
  const grandTotal = ACCTS.reduce((s,a)=>s+dates.reduce((ss,d)=>ss+(dm[`${a}|${d}`]?.total||0),0),0);

  dw.innerHTML = `
  <div class="daily-chart-card">
    <h3>Daily Sales by Cafe — ${getMonthName(vMonth,vYear)}</h3>
    <div class="chart-sub">Total food sales per operating day across all four locations</div>
    <div class="daily-chart-wrap"><canvas id="dailyCanvas"></canvas></div>
  </div>
  <div class="daily-tbl-card">
    <div class="tbl-head">
      <h3>Day-by-Day Sales Breakdown</h3>
      <span style="font-size:11px;color:var(--muted)">${dates.length} operating days · ${getMonthName(vMonth,vYear)}</span>
    </div>
    <div class="daily-tbl-scroll">
      <table class="daily-tbl">
        <thead><tr>
          <th class="lft">Date</th><th>Day</th>
          <th class="az-h">Cafe AZ</th>
          <th class="q-h">Cafe Q</th>
          <th class="s-h">Cafe S</th>
          <th class="wt-h">Cafe WT</th>
          <th class="tot-h">All Cafes</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
        <tfoot><tr>
          <td class="lft" colspan="2">MTD TOTAL</td>
          ${footerCells.join('')}
          <td>${fmt(grandTotal)}</td>
        </tr></tfoot>
      </table>
    </div>
  </div>`;

  buildDailyChart(dates, dm);
}

function buildDailyChart(dates, dm) {
  const canvas = document.getElementById('dailyCanvas');

    type: 'bar',

      labels,
      datasets: ACCTS.map(acct => ({

        borderRadius: 3,

      responsive: true, maintainAspectRatio: false,
      interaction: { mode:'index', intersect:false },

function renderCogsTab(acct, rows, t) {
  const cogsP   = t.sales > 0 ? (t.spend / t.sales * 100) : 0;
  const avgDail = rows.filter(r=>rowSpend(r)>0).length > 0 ? t.vendorSpend / rows.filter(r=>rowSpend(r)>0).length : 0;
  const pctCls  = cogsP < 30 ? 'pct-green' : cogsP < 50 ? 'pct-amber' : 'pct-red';
  const pctBarC = cogsP < 30 ? '#16a34a'   : cogsP < 50 ? '#d97706'   : '#dc2626';

  // Build per-row cogs detail — only show days with sales or spend
  let cumSpend = 0;
  const cogsRows = rows.filter(r => (parseFloat(r.dailySales)||0) > 0 || rowSpend(r) > 0).map(r => {
    const sp    = rowSpend(r);
    const sales = r.totalSales;
    cumSpend += sp;
    const dayPct = sales > 0 ? (sp/sales*100) : 0;
    const vAmts  = {};
    VENDORS.forEach(v => { vAmts[v] = parseFloat(r[v])||0; });
    return { ...r, sp, sales, dayPct, cumSpend, vAmts };
  });

  // Vendor summary cards
  const vendorCards = VENDORS.map(v => {
    const tot  = t.vendors[v];
    const pct  = t.vendorSpend > 0 ? (tot/t.vendorSpend*100) : 0;
    const col  = VCOLORS[v];
    return `
    <div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 14px;border-top:3px solid ${col}">
      <div style="font-size:11px;font-weight:700;color:${col};text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">${VLABELS[v]}</div>
      <div style="font-size:18px;font-weight:800;color:var(--text)">${fmt(tot)}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px">${pct.toFixed(1)}% of vendor spend</div>
      <div class="pbar" style="margin-top:6px"><div class="pbar-fill" style="width:${pct}%;background:${col}"></div></div>
    </div>`;
  }).join('');

  document.getElementById('tabContent').innerHTML = `
  <div class="cogs-kpi-bar">
    <div class="ck">
      <div class="cv c-red">${fmt(t.spend)}</div>
      <div class="cl">MTD Total Spend</div>
      <div class="cogs-pct-bar"><div class="cogs-pct-fill" style="width:${Math.min(100,cogsP)}%;background:${pctBarC}"></div></div>
    </div>
    <div class="ck">
      <div class="cv ${pctCls}">${cogsP.toFixed(1)}%</div>
      <div class="cl">COGs % of Sales</div>
    </div>
    <div class="ck">
      <div class="cv c-red">${fmt(t.vendorSpend)}</div>
      <div class="cl">Vendor Spend</div>
    </div>
    <div class="ck">
      <div class="cv" style="color:#f59e0b">${fmt(t.ancSpend)}</div>
      <div class="cl">Ancillary Spend</div>
    </div>
    <div class="ck">
      <div class="cv c-green">${fmt(t.sales)}</div>
      <div class="cl">MTD Total Sales</div>
    </div>
    <div class="ck">
      <div class="cv ${t.net>=0?'c-green':'c-red'}">${t.net>=0?'+':''}${fmt(t.net)}</div>
      <div class="cl">Net (Sales − Spend)</div>
    </div>
  </div>

  <div class="cogs-subtab-bar">
    <button class="cogs-stab ${cogsSubTab==='vendors'?'active':''}"
      style="${cogsSubTab==='vendors'?'color:#dc2626;border-bottom-color:#dc2626':''}"
      onclick="switchCogsSubTab('vendors')">📦 Vendor Spend</button>
    <button class="cogs-stab ${cogsSubTab==='ancillary'?'active':''}"
      style="${cogsSubTab==='ancillary'?'color:#f59e0b;border-bottom-color:#f59e0b':''}"
      onclick="switchCogsSubTab('ancillary')">🧾 Ancillary Invoices</button>
  </div>

  <div id="cogsSubContent"></div>`;

  renderCogsSubTab(acct, cogsRows, t, vendorCards);
}

function switchCogsSubTab(tab) { cogsSubTab = tab; render(); }

function toInputDate(dateStr) {
  if (!dateStr) return '';
  const d = parseDate(dateStr);
  if (!d) return '';
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function fromInputDate(iso) {
  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${parseInt(m)}/${parseInt(d)}/${y}`;
}
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }


function buildCogsChart(acct, cogsRows) {
  const canvas = document.getElementById('cogsCanvas');
  if (!canvas) return;
  if (chartCogs) { chartCogs.destroy(); chartCogs = null; }
  if (!cogsRows.length) return;

  const labels = cogsRows.map(r => parseDate(r.date).toLocaleDateString('en-US',{month:'short',day:'numeric'}));

  chartCogs = new Chart(canvas, {
    type:'bar',
    data:{
      labels,
      datasets: VENDORS.map(v => ({
        label:           VLABELS[v],
        data:            cogsRows.map(r => r.vAmts[v]),
        backgroundColor: VCOLORS[v] + 'cc',
        borderColor:     VCOLORS[v],
        borderWidth:     1,
        borderRadius:    2,
        borderSkipped:   false,
      }))
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{position:'bottom',labels:{font:{size:10},boxWidth:10,padding:8}},
        tooltip:{callbacks:{
          label: c => ` ${c.dataset.label}: ${fmt(c.raw)}`,
          footer: items => ` Total: ${fmt(items.reduce((s,i)=>s+i.raw,0))}`
        }}
      },
      scales:{
        x:{ stacked:true, grid:{display:false}, ticks:{maxRotation:40,font:{size:9}} },
        y:{ stacked:true, ticks:{callback:v=>'$'+(v/1000).toFixed(0)+'k',font:{size:10}}, grid:{color:'#f1f5f9'} }
      }
    }
  });
}

/* ── Vendor Share Donut ── */
function buildVendorDonut(acct, t) {
  const canvas = document.getElementById('cogsCumCanvas');
  if (!canvas) return;
  if (chartCogsP) { chartCogsP.destroy(); chartCogsP = null; }

  const vals = VENDORS.map(v => t.vendors[v]);
  const cols  = VENDORS.map(v => VCOLORS[v]);

  chartCogsP = new Chart(canvas, {
    type:'doughnut',
    data:{
      labels: VENDORS.map(v => VLABELS[v]),
      datasets:[{
        data: vals,
        backgroundColor: cols,
        borderColor: '#fff',
        borderWidth: 2,
        hoverOffset: 6,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      cutout:'60%',
      plugins:{
        legend:{position:'right',labels:{font:{size:10},boxWidth:12,padding:8}},
        tooltip:{callbacks:{
          label: c => ` ${c.label}: ${fmt(c.raw)} (${t.spend>0?(c.raw/t.spend*100).toFixed(1):0}%)`
        }}
      }
    }
  });
}

  const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  return `<table>
    <thead>
      <tr>
        <th>Day</th>
        <th>Date</th>

      const net   = sales - sp;
      const bc    = balClass(r.runBal, state[acct].startingBalance);

      return `
      <tr style="${rowBg}">
        <td style="font-size:11px;font-weight:700;color:${isWkd?'#94a3b8':'var(--muted)'};width:36px;text-align:center">
          ${DAY_NAMES[dow]}
        </td>
        <td style="white-space:nowrap;font-weight:${isWkd?'400':'600'};color:${isWkd?'#94a3b8':'var(--text)'};font-size:13px;width:60px">
          ${dateLabel}
        </td>
        <td style="width:140px">
          <input type="number" value="${parseFloat(r.dailySales)||0}" placeholder="0"

            style="border-bottom:2px solid var(--fooda)${isWkd?'22':'44'};color:${isWkd?'#94a3b8':'var(--text)'}"
            onchange="upd('${acct}','${r.id}','dailySales',this.value)" />
        </td>
        <td class="num" style="font-weight:600;color:#dc2626;font-size:12px" title="Enter vendor detail in Spend / COGs tab">

        <td class="num" style="font-weight:600;color:${net>0?'#16a34a':net<0?'#dc2626':'#94a3b8'}">
          ${sales>0||sp>0?(net>=0?'+':'-')+fmt(Math.abs(net)):'—'}

        <td class="num" style="font-weight:700">
          <span class="${sales>0||sp>0?bc:''}${isWkd&&!sales&&!sp?'c-muted':''}">
            ${fmt(r.runBal)}

        </td>
      </tr>`;
    }).join('')}

    <tfoot>
      <tr class="tfoot-row">
        <td colspan="2">TOTALS</td>
        <td class="num c-green">${fmt(tSales)}</td>
        <td class="num c-red">${fmt(tSpend)}</td>
        <td class="num" style="color:${tNet>=0?'#16a34a':'#dc2626'}">${tNet>=0?'+':'-'}${fmt(Math.abs(tNet))}</td>
        <td class="num"></td>
      </tr>
    </tfoot>
  </table>`;
}

/* ── Balance Trend Chart ── */
function buildBalChart(acct, rows) {
  const col    = COLORS[acct];
  const canvas = document.getElementById('balCanvas');
  if (!canvas) return;
  if (chartBal) { chartBal.destroy(); chartBal = null; }

  const labels = ['Start'];
  const data   = [state[acct].startingBalance];
  rows.forEach(r => {
    labels.push(parseDate(r.date).toLocaleDateString('en-US',{month:'short',day:'numeric'}));
    data.push(r.runBal);
  });

  chartBal = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Balance',
        data,
        borderColor: col,
        backgroundColor: col + '15',
        fill: true, tension: 0.35,
        pointRadius: 4, pointHoverRadius: 6,
        pointBackgroundColor: col, pointBorderColor: '#fff', pointBorderWidth: 2,
        borderWidth: 2.5,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => '  Balance: '+fmt(c.raw) } }
      },
      scales: {
        y: { ticks: { callback: v=>'$'+(v/1000).toFixed(0)+'k', font:{size:10} }, grid:{color:'#f1f5f9'} },
        x: { grid:{display:false}, ticks:{maxRotation:40,font:{size:10}} }
      }
    }
  });
}

/* ── Meal Period Bar Chart ── */
function buildMealChart(acct, rows) {
  const canvas = document.getElementById('mealCanvas');
  if (!canvas) return;
  if (chartMeal) { chartMeal.destroy(); chartMeal = null; }
  if (!rows.length) return;

  const labels = rows.map(r => parseDate(r.date).toLocaleDateString('en-US',{month:'short',day:'numeric'}));
  const bfData = rows.map(r => parseFloat(r.bfSales)||0);
  const lnData = rows.map(r => parseFloat(r.lnSales)||0);
  const dnData = rows.map(r => parseFloat(r.dnSales)||0);
  const rtData = rows.map(r => parseFloat(r.retailSales)||0);
  const brData = rows.map(r => parseFloat(r.baristaSales)||0);

  chartMeal = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label:'Breakfast',        data:bfData, backgroundColor:'#f59e0b', borderRadius:3, borderSkipped:false },
        { label:'Lunch',            data:lnData, backgroundColor:'#0ea5e9', borderRadius:3, borderSkipped:false },
        { label:'Dinner',           data:dnData, backgroundColor:'#8b5cf6', borderRadius:3, borderSkipped:false },
        { label:'11 Dining/Retail', data:rtData, backgroundColor:'#14b8a6', borderRadius:3, borderSkipped:false },
        { label:'11 Dining/Barista',data:brData, backgroundColor:'#b45309', borderRadius:3, borderSkipped:false },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode:'index', intersect:false },
      plugins: {
        legend: { position:'bottom', labels:{font:{size:10},boxWidth:10,padding:10} },
        tooltip: { callbacks: { label: c => ` ${c.dataset.label}: ${fmt(c.raw)}` } }
      },
      scales: {
        x: { stacked:true, grid:{display:false}, ticks:{maxRotation:40,font:{size:9}} },
        y: { stacked:true, ticks:{callback:v=>'$'+(v/1000).toFixed(0)+'k',font:{size:10}}, grid:{color:'#f1f5f9'} }
      }
    }
  });
}

/* ══════════════════════════════════════════════
   ACTIONS
══════════════════════════════════════════════ */
function setActive(acct) { active = acct; detailTab = 'entries'; render(); saveState(); window.scrollTo({top:300,behavior:'smooth'}); }
function switchTab(tab) { detailTab = tab; render(); saveState(); }

function shiftMonth(d) {
  vMonth += d;
  if (vMonth < 0)  { vMonth = 11; vYear--; }
  if (vMonth > 11) { vMonth = 0;  vYear++; }
  ensureMonthDays(vMonth, vYear);
  render(); saveState();
}
function goToday() { vMonth = new Date().getMonth(); vYear = new Date().getFullYear(); ensureMonthDays(vMonth, vYear); render(); saveState(); }

function addEntry(acct) {
  const e = { id: mkId(), date: new Date().toISOString().split('T')[0], dailySales: '' };
  VENDORS.forEach(v => { e[v] = ''; });
  state[acct].entries.push(e);
  render(); saveState();
}

function upd(acct, id, field, val) {
  const e = state[acct].entries.find(e => e.id === id);
  if (e) e[field] = val;
  render(); saveState();
}

function delEntry(acct, id) {
  state[acct].entries = state[acct].entries.filter(e => e.id !== id);
  render(); saveState();
}

function updateStartBal(acct, val) {
  state[acct].startingBalance = parseFloat(val) || 0;
  render(); saveState();
}

/* ── Ancillary actions ── */
function addAnc(acct) {
  if (!state[acct].ancillary) state[acct].ancillary = [];
  const today = `${vMonth+1}/${new Date().getDate()}/${vYear}`;
  state[acct].ancillary.push({ id: mkId(), date: today, description: '', amount: '', note: '' });
  render(); saveState();
}

function updAnc(acct, id, field, val) {
  const a = (state[acct].ancillary||[]).find(a => a.id === id);
  if (a) a[field] = val;
  render(); saveState();
}

function delAnc(acct, id) {
  state[acct].ancillary = (state[acct].ancillary||[]).filter(a => a.id !== id);
  render(); saveState();
}

/* ── Retail actions ── */
function addRetail(acct) {
  if (!state[acct].retail) state[acct].retail = [];
  const today = `${vMonth+1}/${new Date().getDate()}/${vYear}`;
  state[acct].retail.push({ id: mkId(), date: today, item: '', category: '', amount: '', cost: '', note: '' });
  render(); saveState();
}

function updRetail(acct, id, field, val) {
  const r = (state[acct].retail||[]).find(r => r.id === id);
  if (r) r[field] = val;
  render(); saveState();
}

function delRetail(acct, id) {
  state[acct].retail = (state[acct].retail||[]).filter(r => r.id !== id);
  render(); saveState();
}

function downloadFile() {
  // Get the full HTML source
  let html = document.documentElement.outerHTML;

  // Serialize current live state
  const stateJson = JSON.stringify(state, null, 2);

  // Replace the state block in the source with current data
  // We match from "/* Real data:" or the const state = { line through the closing }; 
  html = html.replace(/const state = \{[\s\S]*?\n\};/, 'const state = ' + stateJson + ';');

  // Also bake in current vMonth/vYear/active so it opens on the right view
  html = html.replace(/let vMonth = [^;]+;/, 'let vMonth = ' + vMonth + ';');
  html = html.replace(/let vYear\s*=\s*[^;]+;/, 'let vYear = ' + vYear + ';');
  html = html.replace(/let active\s*=\s*'[^']+';/, "let active = '" + active + "';");

  const blob = new Blob([html], { type: 'text/html' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href     = url;
  a.download = 'fooda-dashboard-' + date + '.html';
  a.click();
  URL.revokeObjectURL(url);
}

startListening(); // Firebase loads state and calls render() when ready
